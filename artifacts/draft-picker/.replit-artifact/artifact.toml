kind = "web"
previewPath = "/"
title = "Brawl Stars Draft Picker"
version = "1.0.0"
id = "artifacts/draft-picker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22961

[services.development]
run = "pnpm --filter @workspace/draft-picker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/draft-picker", "run", "build" ]
publicDir = "artifacts/draft-picker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22961"
BASE_PATH = "/"
